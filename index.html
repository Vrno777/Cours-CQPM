// Génération de questions de calcul avec valeurs aléatoires
function randInt(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }
function roundTo(val, decimals){ const f=Math.pow(10,decimals); return Math.round(val*f)/f; }

const CALC_GENERATORS = [
  // Pouce → mm (fraction simple)
  function(){
    const fractions = [
      {num:1, den:2}, {num:1, den:4}, {num:3, den:4}, {num:1, den:8},
      {num:3, den:8}, {num:5, den:8}, {num:7, den:8}, {num:1, den:16},
      {num:3, den:16}, {num:5, den:16}, {num:7, den:16}, {num:9, den:16}, {num:11, den:16}
    ];
    const f = fractions[randInt(0, fractions.length-1)];
    const answer = roundTo(25.4 * (f.num/f.den), 3);
    return {
      theme:'Calcul — Longueurs',
      q:`Convertis ${f.num}/${f.den} de pouce en millimètres.`,
      answer, tolerance:0.05, unit:'mm',
      steps:`25,4 × (${f.num}/${f.den}) = 25,4 × ${roundTo(f.num/f.den,4)} = ${answer} mm`,
      exp:"Pour convertir une fraction de pouce en mm, on multiplie 25,4 par cette fraction."
    };
  },
  // Pieds → mètres
  function(){
    const ft = randInt(2, 50) * 100; // valeurs rondes type 2000-5000
    const answer = roundTo(ft * 0.3048, 1);
    return {
      theme:'Calcul — Longueurs',
      q:`Combien de mètres représentent ${ft} ft (pieds) ?`,
      answer, tolerance: Math.max(1, ft*0.001), unit:'m',
      steps:`${ft} × 0,3048 = ${answer} m`,
      exp:"1 pied = 0,3048 m. On multiplie donc le nombre de pieds par 0,3048 pour obtenir des mètres."
    };
  },
  // PSI → bar
  function(){
    const psi = randInt(50, 400);
    const answer = roundTo(psi * 0.069, 2);
    return {
      theme:'Calcul — Pression',
      q:`Convertis ${psi} PSI en bar.`,
      answer, tolerance:0.3, unit:'bar',
      steps:`${psi} × 0,069 = ${answer} bar`,
      exp:"Pour passer de PSI à bar, on multiplie par 0,069."

      q:`Convertis ${bar} bar en PSI (valeur approchée).`,

      steps:`${bar} ÷ 0,069 ≈ ${answer} PSI`,

      theme:'Calcul — Tuyauteries',
      q: askPe
        ? `Une tuyauterie a une pression nominale (Pn) de ${pn} bar. Quelle est sa pression d'épreuve (Pe) ?`
        : `Une tuyauterie a une pression nominale (Pn) de ${pn} bar. Quelle est sa pression de rupture (Pr) ?`,
      answer, tolerance:0, unit:'bar',
      steps: askPe ? `Pe = 2 × Pn = 2 × ${pn} = ${answer} bar` : `Pr = 4 × Pn = 4 × ${pn} = ${answer} bar`,

  function(){
    const nm = randInt(20, 150);

      theme:'Calcul — Couple',
      q:`Convertis ${nm} N.m en In.lbf.`,
      answer, tolerance:5, unit:'In.lbf',
      steps:`${nm} × 8,8507 ≈ ${answer} In.lbf`,
      exp:"Pour passer de N.m à In.lbf, on multiplie par environ 8,85 (8,8507 précisément)."
    };
  },
  // Ft.lbf → N.m
  function(){
    const ftlbf = randInt(20, 120);
    const answer = roundTo(ftlbf / 0.737, 1);

// LOGIQUE DU QUIZ
// ═══════════════════════════════════════════
let questions = [], current = 0, score = 0, userAnswers = [];

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startQuiz(){
  // 18 QCM tirés au hasard parmi la banque, avec une variante de formulation aléatoire chacun
  const qcmPool = shuffle(QCM_BANK).slice(0, 18).map(item => {
    const variant = item.variants[randInt(0, item.variants.length-1)];
    const opts = variant.opts.map((o,i)=>({text:o, orig:i}));
    const shuffled = shuffle(opts);
    return {
      type:'qcm',
      theme:item.theme,
      q:variant.q,
      opts:shuffled.map(o=>o.text),
      ans:shuffled.findIndex(o=>o.orig===variant.ans),
      exp:item.exp
    };
  });

  // 6 calculs générés aléatoirement (générateurs tirés sans répétition)
  const calcPool = shuffle(CALC_GENERATORS).slice(0, 6).map(gen => {
    const c = gen();
    return {type:'calc', ...c};
  });

  questions = shuffle([...qcmPool, ...calcPool]);
  current = 0; score = 0; userAnswers = [];
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion(){
  const q = questions[current];
  document.getElementById('prog-label').textContent = `Question ${current+1}/24`;
  document.getElementById('prog-score').textContent = `✓ ${score}`;
  document.getElementById('prog-fill').style.width = `${(current/24)*100}%`;
  document.getElementById('prog-type').textContent = q.theme;

  const tag = document.getElementById('q-tag');
  if(q.type === 'calc'){
    tag.textContent = '🧮 Calcul';
    tag.className = 'q-tag calc';
  } else {
    tag.textContent = '✅ QCM';
    tag.className = 'q-tag qcm';
  }

  let qHtml = q.q;
  document.getElementById('q-text').innerHTML = qHtml;

  const body = document.getElementById('q-body');
  body.innerHTML = '';

  if(q.type === 'qcm'){
    const letters = ['A','B','C','D'];
    const optDiv = document.createElement('div');
    optDiv.className = 'options';
    q.opts.forEach((o,i)=>{
      const d = document.createElement('div');
      d.className = 'opt';
      d.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${o}</span>`;
      d.onclick = () => selectQcmAnswer(i, d);
      optDiv.appendChild(d);
    });
    body.appendChild(optDiv);
  } else {
    const wrap = document.createElement('div');
    wrap.className = 'calc-input-wrap';
    wrap.innerHTML = `
      <div class="calc-input-row">
        <input type="text" inputmode="decimal" class="calc-input" id="calc-input" placeholder="Ta réponse">
        <span class="calc-unit">${q.unit || ''}</span>
      </div>
      <button class="btn-validate" id="btn-validate" onclick="validateCalc()">Valider</button>
    `;
    body.appendChild(wrap);
    setTimeout(()=>{
      const inp = document.getElementById('calc-input');
      inp.focus();
      inp.addEventListener('keydown', e => { if(e.key === 'Enter') validateCalc(); });
    }, 50);
  }

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';

  const btn = document.getElementById('btn-next');
  btn.className = 'btn-next';
  btn.textContent = current < 23 ? 'Question suivante →' : 'Voir les résultats →';
}

function selectQcmAnswer(idx, el){
  const q = questions[current];
  const opts = document.querySelectorAll('.opt');
  opts.forEach(o => o.classList.add('disabled'));

  const correct = idx === q.ans;
  if(correct) score++;
  userAnswers.push({q, userAnswer: q.opts[idx], correct});

  el.classList.add(correct ? 'correct' : 'wrong');
  if(!correct) opts[q.ans].classList.add('correct');

  showFeedback(correct, q.exp);
  document.getElementById('btn-next').classList.add('show');
}

function validateCalc(){
  const q = questions[current];
  const inp = document.getElementById('calc-input');
  const val = parseFloat(inp.value.replace(',','.'));

  if(isNaN(val)){
    inp.focus();
    return;
  }

  const correct = Math.abs(val - q.answer) <= q.tolerance + 1e-9;
  if(correct) score++;

  userAnswers.push({q, userAnswer: inp.value + ' ' + (q.unit||''), correct});

  inp.classList.add(correct ? 'correct' : 'wrong');
  inp.disabled = true;
  document.getElementById('btn-validate').disabled = true;

  let feedbackText = correct
    ? `✔ <strong>Bonne réponse !</strong> ${q.exp}`

  const fb = document.getElementById('feedback');
  fb.className = `feedback ${correct?'ok':'ko'} show`;
  fb.innerHTML = feedbackText;

  document.getElementById('btn-next').classList.add('show');
}

// QCM ATA — avec distracteurs proches
// ═══════════════════════════════════════════
let ataQuestions = [], ataCurrent = 0, ataScore = 0, ataUserAnswers = [];

// Index ATA_DATA par numéro pour trouver les voisins facilement
function ataIndexOf(num){ return ATA_DATA.findIndex(a=>a.num===num); }

function buildAtaQuestion(target){
  const idx = ataIndexOf(target.num);
  // Distracteurs prioritaires : les chapitres voisins (±1, ±2) dans la même plage
  let neighborPool = [];
  for(let d=-3; d<=3; d++){
    if(d===0) continue;
    const n = ATA_DATA[idx+d];
    if(n) neighborPool.push(n);
  }
  // Compléter avec des chapitres aléatoires si pas assez de voisins
  let distractors = shuffle(neighborPool).slice(0,3);
  if(distractors.length < 3){
    const rest = shuffle(ATA_DATA.filter(a=>a.num!==target.num && !distractors.includes(a)));
    while(distractors.length < 3 && rest.length){
      distractors.push(rest.shift());
    }
  }

  // Deux formats de question : "ATA X correspond à ?" ou "Quel ATA pour [système] ?"
  // Consignes en français, terminologie technique en anglais
  const numToName = Math.random() < 0.5;
  let q, opts, ansIdx;

  if(numToName){
    q = `À quoi correspond l'ATA ${target.num} ?`;
    const allOpts = shuffle([target, ...distractors]);
    opts = allOpts.map(o=>o.name);
    ansIdx = allOpts.findIndex(o=>o.num===target.num);
  } else {
    q = `Quel chapitre ATA correspond à "${target.name}" ?`;
    const allOpts = shuffle([target, ...distractors]);
    opts = allOpts.map(o=>`ATA ${o.num}`);
    ansIdx = allOpts.findIndex(o=>o.num===target.num);
  }

  return {
    q, opts, ans: ansIdx,
    exp: `ATA ${target.num} = ${target.name}.`
  };
}

function startAtaQuiz(){
  const targets = shuffle(ATA_DATA).slice(0, 15);
  ataQuestions = targets.map(buildAtaQuestion);
  ataCurrent = 0; ataScore = 0; ataUserAnswers = [];
  showAtaScreen('ata-qcm-quiz');
  renderAtaQuestion();
}

function renderAtaQuestion(){
  const q = ataQuestions[ataCurrent];
  document.getElementById('ata-prog-label').textContent = `Question ${ataCurrent+1}/15`;
  document.getElementById('ata-prog-score').textContent = `✓ ${ataScore}`;
  document.getElementById('ata-prog-fill').style.width = `${(ataCurrent/15)*100}%`;
  document.getElementById('ata-q-text').textContent = q.q;

  const letters = ['A','B','C','D'];
  const optDiv = document.getElementById('ata-q-options');
  optDiv.innerHTML = '';
  q.opts.forEach((o,i)=>{
    const d = document.createElement('div');
    d.className = 'opt';
    d.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${o}</span>`;
    d.onclick = () => selectAtaAnswer(i, d);
    optDiv.appendChild(d);
  });

  const fb = document.getElementById('ata-feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';

  const btn = document.getElementById('ata-btn-next');
  btn.className = 'btn-next';
  btn.textContent = ataCurrent < 14 ? 'Question suivante →' : 'Voir les résultats →';
}

function selectAtaAnswer(idx, el){
  const q = ataQuestions[ataCurrent];
  const opts = document.querySelectorAll('#ata-q-options .opt');
  opts.forEach(o => o.classList.add('disabled'));

  const correct = idx === q.ans;
  if(correct) ataScore++;
  ataUserAnswers.push({q, userAnswer: q.opts[idx], correct});

  el.classList.add(correct ? 'correct' : 'wrong');
  if(!correct) opts[q.ans].classList.add('correct');

  const fb = document.getElementById('ata-feedback');
  fb.className = `feedback ${correct?'ok':'ko'} show`;
  fb.innerHTML = correct
    ? `✔ <strong>Bonne réponse !</strong> ${q.exp}`
    : `✘ <strong>Mauvaise réponse.</strong> ${q.exp}`;

  document.getElementById('ata-btn-next').classList.add('show');
}

function nextAtaQuestion(){
  ataCurrent++;
  if(ataCurrent >= 15){ endAtaQuiz(); return; }
  renderAtaQuestion();
}

function endAtaQuiz(){
  showAtaScreen('ata-qcm-results');

  else { mention='Très bien'; cls='tres-bien'; }

  const mEl = document.getElementById('ata-mention');

  mEl.className = `mention ${cls}`;

  const corrList = document.getElementById('ata-correction-list');
  corrList.innerHTML = '';
  const letters = ['A','B','C','D'];
  ataUserAnswers.forEach((ua,i)=>{
    const d = document.createElement('div');
    d.className = 'corr-item';
    let html = `<div class="corr-q"><span class="corr-q-num">Q${i+1}</span>${ua.q.q}</div>`;
    html += `<div class="corr-ans ${ua.correct?'user-ok':'user-ko'}">${ua.correct?'✔':'✘'} Votre réponse : ${ua.userAnswer}</div>`;
    if(!ua.correct) html += `<div class="corr-ans correct-ans">✔ Bonne réponse : ${ua.q.opts[ua.q.ans]}</div>`;
    html += `<div class="corr-exp">${ua.q.exp}</div>`;
    d.innerHTML = html;
    corrList.appendChild(d);
  });
}

  });
}

<script>
(function(){
  var CODE = "MECCABINE289";
  var KEY  = "app_cabine_auth";

  var gate   = document.getElementById("gate");
  var app    = document.getElementById("app");
  var input  = document.getElementById("code");
  var unlock = document.getElementById("unlock");
  var errMsg = document.getElementById("err-msg");

  var ifCours = document.getElementById("if-cours");
  var ifQuiz  = document.getElementById("if-quiz");
  var loaded  = {cours:false, quiz:false};

  function srcOf(id){ return document.getElementById(id).textContent; }

  function loadFrame(view){
    if(loaded[view]) return;
    if(view==="cours"){ ifCours.srcdoc = srcOf("doc-cours"); }
    else { ifQuiz.srcdoc = srcOf("doc-quiz"); }
    loaded[view] = true;
  }

  function openApp(){
    gate.classList.add("hidden");
    app.classList.add("show");
    loadFrame("cours");        // le cours est chargé d'office
  }

  function tryUnlock(){
    if(input.value.trim() === CODE){
      try{ sessionStorage.setItem(KEY,"1"); }catch(e){}
      errMsg.textContent = "";
      openApp();
    } else {
      input.classList.add("err");
      errMsg.textContent = "Code incorrect.";
      setTimeout(function(){ input.classList.remove("err"); }, 400);
    }
  }

  unlock.addEventListener("click", tryUnlock);
  input.addEventListener("keydown", function(e){ if(e.key==="Enter") tryUnlock(); });

  // Onglets
  document.querySelectorAll(".tab").forEach(function(btn){
    btn.addEventListener("click", function(){
      var view = btn.getAttribute("data-view");
      document.querySelectorAll(".tab").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      loadFrame(view);
      ifCours.classList.toggle("active", view==="cours");
      ifQuiz.classList.toggle("active", view==="quiz");
    });
  });

  // Déjà authentifié sur cette session ?
  try{ if(sessionStorage.getItem(KEY)==="1"){ openApp(); } }catch(e){}

  if(!app.classList.contains("show")){ setTimeout(function(){ input.focus(); }, 200); }
})();
</script>
