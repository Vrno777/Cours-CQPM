<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Intégrateur Cabine — Cours & QCM</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1116; --card:#161b22; --card2:#1c232d; --line:#2a323d;
    --text:#e9edf2; --muted:#8b96a5;
    --accent:#4fc3f7; --accent2:#4dd0a7; --red:#ff6b5e;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  /* ===== ÉCRAN DE CONNEXION ===== */
  #gate{
    position:fixed; inset:0; z-index:1000;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px;
    background:radial-gradient(120% 80% at 50% 0%, #1c232d 0%, #0e1116 60%);
  }
  #gate.hidden{display:none;}
  .gate-card{
    width:100%; max-width:360px;
    background:var(--card); border:1px solid var(--line); border-radius:20px;
    padding:32px 24px; text-align:center;
    box-shadow:0 24px 60px rgba(0,0,0,.45);
  }
  .gate-eyebrow{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.22em;
    text-transform:uppercase; color:var(--muted); margin-bottom:14px;
  }
  .gate-icon{font-size:34px; margin-bottom:10px;}
  .gate-card h1{
    font-family:'Space Grotesk',sans-serif; font-size:1.35rem; font-weight:700;
    margin-bottom:6px; line-height:1.2;
  }
  .gate-card p{color:var(--muted); font-size:13px; margin-bottom:22px;}
  #code{
    width:100%; padding:14px 16px; border-radius:12px;
    background:var(--card2); border:1px solid var(--line); color:var(--text);
    font-family:'JetBrains Mono',monospace; font-size:15px; letter-spacing:.05em;
    text-align:center; outline:none; transition:border-color .2s;
  }
  #code:focus{border-color:var(--accent);}
  #code.err{border-color:var(--red); animation:shake .35s;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}
  #unlock{
    width:100%; margin-top:14px; padding:14px; border:0; border-radius:12px;
    background:var(--accent); color:#06222e; font-weight:700; font-size:15px;
    font-family:'Inter',sans-serif; cursor:pointer; transition:filter .2s;
  }
  #unlock:active{filter:brightness(.9);}
  #err-msg{color:var(--red); font-size:12.5px; height:16px; margin-top:12px; font-weight:600;}

  /* ===== APP ===== */
  #app{display:none; flex-direction:column; height:100%;}
  #app.show{display:flex;}

  .tabbar{
    flex:0 0 auto; display:flex; gap:6px; padding:10px 12px;
    padding-top:calc(10px + env(safe-area-inset-top));
    background:linear-gradient(180deg,#161b22,#11161d);
    border-bottom:1px solid var(--line);
  }
  .tab{
    flex:1; display:flex; align-items:center; justify-content:center; gap:7px;
    padding:11px 8px; border:1px solid var(--line); border-radius:12px;
    background:var(--card2); color:var(--muted);
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px;
    cursor:pointer; transition:all .2s;
  }
  .tab .ic{font-size:16px;}
  .tab.active{background:var(--accent); color:#06222e; border-color:var(--accent);}
  .tab.active.quiz{background:var(--accent2); border-color:var(--accent2); color:#063322;}

  .frames{flex:1 1 auto; position:relative; min-height:0;}
  .frames iframe{
    position:absolute; inset:0; width:100%; height:100%;
    border:0; background:var(--bg); display:none;
  }
  .frames iframe.active{display:block;}
</style>
</head>
<body>

  <!-- Écran de connexion -->
  <div id="gate">
    <div class="gate-card">
      <div class="gate-eyebrow">CQPM-289</div>
      <div class="gate-icon">🛩️</div>
      <h1>Intégrateur Cabine</h1>
      <p>Cours &amp; QCM — accès protégé</p>
      <input id="code" type="password" inputmode="text" autocomplete="off"
             placeholder="Code d'accès" autocapitalize="characters" spellcheck="false">
      <button id="unlock">Entrer</button>
      <div id="err-msg"></div>
    </div>
  </div>

  <!-- Application -->
  <div id="app">
    <div class="tabbar">
      <button class="tab active" data-view="cours"><span class="ic">📘</span>Cours</button>
      <button class="tab quiz" data-view="quiz"><span class="ic">📝</span>QCM</button>
    </div>
    <div class="frames">
      <iframe id="if-cours" class="active" title="Cours"></iframe>
      <iframe id="if-quiz" title="QCM"></iframe>
    </div>
  </div>

  <!-- Documents embarqués (non exécutés ici) -->
  <script type="text/html" id="doc-cours"><!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mémo — Intégrateur Cabine</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1116;
    --card:#161b22;
    --card2:#1c232d;
    --line:#2a323d;
    --text:#e9edf2;
    --muted:#8b96a5;

    --c-secu:#ff6b5e;     /* sécurité - rouge corail */
    --c-secu-bg:rgba(255,107,94,0.12);
    --c-mesure:#4fc3f7;   /* mesures/calculs - bleu */
    --c-mesure-bg:rgba(79,195,247,0.12);
    --c-facteur:#ffb74d;  /* facteurs humains - ambre */
    --c-facteur-bg:rgba(255,183,77,0.12);
    --c-doc:#ba9cf6;      /* doc technique - violet */
    --c-doc-bg:rgba(186,156,246,0.12);
    --c-fod:#4dd0a7;      /* anti-FOD - vert menthe */
    --c-fod-bg:rgba(77,208,167,0.12);
    --c-techno:#f48fb1;   /* techno système - rose */
    --c-techno-bg:rgba(244,143,177,0.12);
    --c-visserie:#ffd54f; /* visserie - jaune */
    --c-visserie-bg:rgba(255,213,79,0.12);
    --c-tuyau:#80deea;    /* tuyauteries - cyan */
    --c-tuyau-bg:rgba(128,222,234,0.12);
    --c-formule:#a5d6a7;  /* formulaire - vert clair */
    --c-formule-bg:rgba(165,214,167,0.12);
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:15px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }

  /* ===== HERO ===== */
  .hero{
    padding:48px 20px 28px;
    background:linear-gradient(160deg, #161b22 0%, #0e1116 70%);
    border-bottom:1px solid var(--line);
  }
  .hero-eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:10px;
  }
  .hero h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:1.7rem;
    font-weight:700;
    line-height:1.25;
    margin-bottom:8px;
  }
  .hero p{
    color:var(--muted);
    font-size:13.5px;
    max-width:520px;
  }

  /* ===== NAV PILLS (sticky horizontal scroll) ===== */
  .nav-wrap{
    position:sticky;
    top:0;
    z-index:50;
    background:rgba(14,17,22,0.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    padding:10px 0;
  }
  .nav-scroll{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:0 16px;
    scrollbar-width:none;
  }
  .nav-scroll::-webkit-scrollbar{display:none;}
  .nav-pill{
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    font-weight:500;
    white-space:nowrap;
    padding:7px 13px;
    border-radius:20px;
    border:1px solid var(--line);
    color:var(--muted);
    text-decoration:none;
    flex-shrink:0;
    transition:border-color .15s,color .15s;
  }
  .nav-pill:active{opacity:.7;}

  /* ===== CONTAINER ===== */
  .container{padding:24px 16px 0;max-width:680px;margin:0 auto;}

  /* ===== SECTION BLOCK ===== */
  .section{margin-bottom:36px;scroll-margin-top:64px;}
  .section-head{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
  }
  .section-icon{
    width:34px;height:34px;
    border-radius:9px;
    display:flex;align-items:center;justify-content:center;
    font-size:17px;
    flex-shrink:0;
  }
  .section-head h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:1.15rem;
    font-weight:700;
  }
  .session-tag{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--muted);
    margin-left:auto;
    white-space:nowrap;
  }

  /* ===== CARDS ===== */
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px 16px;
    margin-bottom:10px;
  }
  .card h3{
    font-size:13px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    margin-bottom:10px;
  }
  .card ul{list-style:none;display:flex;flex-direction:column;gap:7px;}
  .card ul li{
    font-size:14px;
    color:var(--text);
    padding-left:16px;
    position:relative;
    line-height:1.55;
  }
  .card ul li::before{
    content:'';
    position:absolute;
    left:0;top:9px;
    width:6px;height:6px;
    border-radius:50%;
    background:var(--accent,var(--muted));
  }
  .card ul li strong{font-weight:600;}
  .card p{font-size:14px;color:var(--text);line-height:1.6;}
  .card p + p{margin-top:8px;}

  /* color accents per section */
  .acc-secu{--accent:var(--c-secu);}
  .acc-secu .card h3{color:var(--c-secu);}
  .acc-secu.section-icon, .icon-secu{background:var(--c-secu-bg);color:var(--c-secu);}

  .acc-mesure{--accent:var(--c-mesure);}
  .acc-mesure .card h3{color:var(--c-mesure);}
  .icon-mesure{background:var(--c-mesure-bg);color:var(--c-mesure);}

  .acc-facteur{--accent:var(--c-facteur);}
  .acc-facteur .card h3{color:var(--c-facteur);}
  .icon-facteur{background:var(--c-facteur-bg);color:var(--c-facteur);}

  .acc-doc{--accent:var(--c-doc);}
  .acc-doc .card h3{color:var(--c-doc);}
  .icon-doc{background:var(--c-doc-bg);color:var(--c-doc);}

  .acc-fod{--accent:var(--c-fod);}
  .acc-fod .card h3{color:var(--c-fod);}
  .icon-fod{background:var(--c-fod-bg);color:var(--c-fod);}

  .acc-techno{--accent:var(--c-techno);}
  .acc-techno .card h3{color:var(--c-techno);}
  .icon-techno{background:var(--c-techno-bg);color:var(--c-techno);}

  .acc-visserie{--accent:var(--c-visserie);}
  .acc-visserie .card h3{color:var(--c-visserie);}
  .icon-visserie{background:var(--c-visserie-bg);color:var(--c-visserie);}

  .acc-tuyau{--accent:var(--c-tuyau);}
  .acc-tuyau .card h3{color:var(--c-tuyau);}
  .icon-tuyau{background:var(--c-tuyau-bg);color:var(--c-tuyau);}

  .acc-formule{--accent:var(--c-formule);}
  .acc-formule .card h3{color:var(--c-formule);}
  .icon-formule{background:var(--c-formule-bg);color:var(--c-formule);}

  /* ===== CALCUL BOX (formula + worked example) ===== */
  .calc{
    background:var(--card2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 15px;
    margin-top:10px;
  }
  .calc-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--accent,var(--muted));
    margin-bottom:8px;
    display:block;
  }
  .calc-formula{
    font-family:'JetBrains Mono',monospace;
    font-size:16px;
    font-weight:600;
    color:var(--text);
    background:rgba(255,255,255,0.04);
    border-radius:7px;
    padding:8px 12px;
    margin-bottom:10px;
    display:inline-block;
  }
  .calc-steps{display:flex;flex-direction:column;gap:6px;}
  .calc-step{
    font-size:13.5px;
    color:var(--muted);
    display:flex;
    gap:8px;
    align-items:baseline;
  }
  .calc-step .step-num{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--accent,var(--muted));
    font-weight:600;
    flex-shrink:0;
  }
  .calc-result{
    margin-top:10px;
    padding-top:10px;
    border-top:1px dashed var(--line);
    font-size:14px;
    font-weight:600;
    color:var(--text);
  }
  .calc-result span{
    font-family:'JetBrains Mono',monospace;
    color:var(--accent,var(--text));
  }

  /* ===== TABLE ===== */
  .mini-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px;}
  .mini-table th{
    text-align:left;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--muted);
    padding:6px 8px;
    border-bottom:1px solid var(--line);
  }
  .mini-table td{
    padding:7px 8px;
    border-bottom:1px solid var(--line);
    color:var(--text);
  }
  .mini-table tr:last-child td{border-bottom:none;}
  .mini-table td.mono{font-family:'JetBrains Mono',monospace;color:var(--accent,var(--text));white-space:nowrap;}

  /* ===== TAG ROW ===== */
  .tagrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .tagrow .tag{
    font-size:12px;
    font-weight:600;
    padding:4px 10px;
    border-radius:20px;
  }
  .tag-red{background:rgba(255,107,94,.15);color:#ff8a7e;}
  .tag-yellow{background:rgba(255,213,79,.15);color:#ffd54f;}
  .tag-blue{background:rgba(79,195,247,.15);color:#4fc3f7;}
  .tag-green{background:rgba(77,208,167,.15);color:#4dd0a7;}
  .tag-orange{background:rgba(255,167,38,.15);color:#ffa726;}
  .tag-gray{background:rgba(139,150,165,.15);color:#aab4c2;}

  /* ===== DEFINITION BOX (complétée par IA) ===== */
  .def{
    border-left:3px solid var(--accent,var(--muted));
    background:rgba(255,255,255,0.03);
    border-radius:0 8px 8px 0;
    padding:10px 14px;
    margin-top:10px;
    font-size:13.5px;
    color:var(--muted);
  }
  .def .def-title{
    font-weight:700;
    color:var(--text);
    display:block;
    margin-bottom:3px;
    font-size:13px;
  }
  .def .def-badge{
    font-family:'JetBrains Mono',monospace;
    font-size:9px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--accent,var(--muted));
    margin-left:6px;
  }

  /* ===== WARNING / IMPORTANT ===== */
  .warn{
    background:var(--c-secu-bg);
    border:1px solid rgba(255,107,94,.3);
    border-radius:10px;
    padding:12px 14px;
    margin-top:10px;
    font-size:13.5px;
    color:#ffb3aa;
  }
  .warn strong{color:#fff;}
  .warn .warn-title{
    font-weight:700;
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--c-secu);
    margin-bottom:4px;
    display:block;
  }

  /* ===== GRID 2 ===== */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
  .grid-card{
    background:var(--card2);
    border:1px solid var(--line);
    border-radius:9px;
    padding:10px 12px;
  }
  .grid-card .gc-title{
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.04em;
    color:var(--accent,var(--text));
    margin-bottom:4px;
  }
  .grid-card p{font-size:12.5px;color:var(--muted);line-height:1.5;}

  /* ===== ATA pill ===== */
  .ata{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    font-weight:600;
    color:var(--accent,var(--text));
    background:rgba(255,255,255,0.05);
    border-radius:5px;
    padding:1px 6px;
    margin-right:6px;
  }

  footer{
    text-align:center;
    color:var(--muted);
    font-size:11.5px;
    padding:32px 20px;
    border-top:1px solid var(--line);
    margin-top:40px;
  }

  /* ===== FLOATING NAV BUTTON ===== */
  .fab{
    position:fixed;
    bottom:90px;
    right:18px;
    width:52px;
    height:52px;
    border-radius:50%;
    background:var(--c-mesure);
    color:#0e1116;
    border:none;
    font-size:21px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 18px rgba(0,0,0,0.45);
    z-index:200;
    cursor:pointer;
    transition:transform .25s, opacity .25s;
  }
  .fab:active{transform:scale(0.92);}
  .fab.hidden{
    transform:translateY(80px) scale(0.8);
    opacity:0;
    pointer-events:none;
  }

  /* ===== SECTION INDICATOR PILL ===== */
  .section-indicator{
    position:fixed;
    bottom:90px;
    left:18px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:20px;
    padding:8px 14px 8px 10px;
    display:flex;
    align-items:center;
    gap:7px;
    font-size:12px;
    font-weight:600;
    color:var(--text);
    box-shadow:0 4px 14px rgba(0,0,0,0.4);
    z-index:200;
    transition:transform .25s, opacity .25s;
    max-width:calc(100vw - 90px);
    overflow:hidden;
    white-space:nowrap;
  }
  .section-indicator.hidden{
    transform:translateY(80px) scale(0.8);
    opacity:0;
    pointer-events:none;
  }
  .section-indicator .si-icon{
    width:22px;height:22px;
    border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;
    flex-shrink:0;
  }
  .section-indicator span.si-label{
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* ===== NAV MODAL ===== */
  .nav-modal{
    position:fixed;
    inset:0;
    background:rgba(8,10,14,0.78);
    backdrop-filter:blur(6px);
    z-index:300;
    display:none;
    align-items:flex-end;
  }
  .nav-modal.open{display:flex;}
  .nav-sheet{
    background:var(--card);
    border-top:1px solid var(--line);
    border-radius:18px 18px 0 0;
    width:100%;
    padding:10px 16px 28px;
    max-height:80vh;
    overflow-y:auto;
    animation:slideUp .22s ease-out;
  }
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .nav-sheet-handle{
    width:36px;height:4px;border-radius:3px;
    background:var(--line);
    margin:6px auto 14px;
  }
  .nav-sheet-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:1rem;
    font-weight:700;
    margin-bottom:12px;
    padding:0 4px;
  }
  .nav-sheet-list{display:flex;flex-direction:column;gap:6px;}
  .nav-sheet-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:13px 14px;
    border-radius:10px;
    background:var(--card2);
    border:1px solid var(--line);
    text-decoration:none;
    color:var(--text);
    font-size:14.5px;
    font-weight:600;
  }
  .nav-sheet-item:active{opacity:.7;}
  .nav-sheet-item .nsi-icon{
    width:32px;height:32px;
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;
    flex-shrink:0;
  }

  /* ===== FORMULAIRE (quick reference) ===== */
  .formula-card{
    background:var(--card);
    border:1px solid var(--line);
    border-left:4px solid var(--accent,var(--c-mesure));
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:12px;
  }
  .formula-card .fc-context{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:.12em;
    text-transform:uppercase;

<div class="container">

  <!-- ════════════ FORMULAIRE — TOUTES LES FORMULES ════════════ -->
  <div class="section acc-formule" id="formule">
    <div class="section-head">
      <div class="section-icon icon-formule">🧮</div>
      <h2>Toutes les formules — Mémo express</h2>
      <span class="session-tag">Révision</span>
    </div>

    <div class="card">
      <p>Toutes les formules du cours réunies ici, classées par thème, avec <strong>explication simple</strong> et <strong>2-3 exemples résolus</strong>. Pas besoin de chercher ailleurs — tout est ici pour réviser rapidement.</p>
    </div>

    <!-- ─── LONGUEURS ─── -->
    <div class="fgroup-title">📏 Longueurs (pouces ↔ mm ↔ pieds)</div>

    <div class="formula-card">
      <div class="fc-context">Conversion de base</div>
      <div class="fc-name">Pouce → millimètre</div>
      <div class="fc-formula">1 inch = 25,4 mm</div>
      <div class="fc-simple">Pour convertir une mesure en pouces vers des mm, on multiplie simplement par 25,4. Si c'est une fraction (ex : 7/8), on multiplie 25,4 par cette fraction.</div>
      <div class="fc-examples">
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple 1</span>
          <span class="fc-ex-calc">7/8 pouce → 25,4 × (7/8) = 25,4 × 0,875</span><br>
          <span class="fc-ex-result">= 22,225 mm</span>
        </div>
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple 2</span>
          <span class="fc-ex-calc">3/16 pouce → 25,4 × (3/16) = 25,4 × 0,1875</span><br>
          <span class="fc-ex-result">= 4,763 mm</span>
        </div>
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple 3 — nombre mixte</span>
          <span class="fc-ex-calc">1'3/4 → (1 × 25,4) + (3/4 × 25,4) = 25,4 + 19,05</span><br>
          <span class="fc-ex-result">= 44,45 mm</span>
        </div>
      </div>
    </div>

    <div class="formula-card">
      <div class="fc-context">Conversion de base</div>
      <div class="fc-name">Pied (foot) → mètre / pouce</div>
      <div class="fc-formula">1 ft = 12 in = 304,8 mm = 0,3048 m</div>
      <div class="fc-simple">Un pied vaut toujours 12 pouces. Pour passer des pieds aux mètres, on multiplie par 0,3048. Pour passer des pouces aux pieds, on divise par 12.</div>
      <div class="fc-examples">
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple 1 — ft → m</span>
          <span class="fc-ex-calc">5000 ft → 5000 × 0,3048</span><br>
          <span class="fc-ex-result">= 1 524 m</span>
        </div>
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple 2 — in → ft</span>
          <span class="fc-ex-calc">73,62 in → 73,62 ÷ 12</span><br>
          <span class="fc-ex-result">= 6,135 ft</span>
        </div>
      </div>
    </div>

    <div class="formula-card">
      <div class="fc-context">Lecture de clés / fractions de pouce</div>
      <div class="fc-name">Simplifier une fraction (règle pair/impair)</div>
      <div class="fc-formula">Si 1er chiffre pair → diviser par 2 jusqu'à obtenir un chiffre impair</div>
      <div class="fc-simple">Pour lire une cote sur une clé en pouces (ex : 4/16), on simplifie la fraction. Tant que le chiffre du haut (numérateur) est pair, on divise le haut ET le bas par 2. On s'arrête quand le numérateur devient impair.</div>
      <div class="fc-examples">
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple 1</span>
          <span class="fc-ex-calc">4/16 → 4 est pair → ÷2 → 2/8 → 2 est encore pair → ÷2 → 1/8... attention !</span><br>
          <span class="fc-ex-result">1/4 (1 est impair, on s'arrête)</span>
        </div>
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple 2 — au-dessus de 16/16 (1 pouce entier)</span>
          <span class="fc-ex-calc">18/16 = 16/16 (= 1 pouce entier) + 2/16 restant. On simplifie 2/16 → ÷2 → 1/8</span><br>
          <span class="fc-ex-result">= 1 pouce + 1/8</span>
        </div>
      </div>
    </div>

    <div class="formula-card">
      <div class="fc-context">Comparer des fractions différentes</div>
      <div class="fc-name">Mettre au même dénominateur (ex : base 32)</div>
      <div class="fc-formula">Multiplier le haut ET le bas par le même nombre</div>
      <div class="fc-simple">Pour classer des outils de tailles différentes (1/4, 5/16, 7/8...), on les ramène tous au même dénominateur (souvent 32, qui est divisible par 4, 8 et 16). On cherche par quoi multiplier le dénominateur pour arriver à 32, puis on applique le même calcul au numérateur.</div>
      <div class="fc-examples">
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple 1</span>
          <span class="fc-ex-calc">7/8 → pour passer de 8 à 32, on multiplie par 4 (8×4=32) → donc 7×4 = 28</span><br>
          <span class="fc-ex-result">7/8 = 28/32</span>
        </div>
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple 2</span>
          <span class="fc-ex-calc">1/4 → pour passer de 4 à 32, on multiplie par 8 (4×8=32) → donc 1×8 = 8</span><br>
          <span class="fc-ex-result">1/4 = 8/32</span>
        </div>
      </div>
    </div>

    <!-- ─── PRESSION ─── -->
    <div class="fgroup-title">💨 Pression</div>

    <div class="formula-card">
      <div class="fc-context">Définition physique de la pression</div>
      <div class="fc-name">P = F / S</div>
      <div class="fc-formula">Pression = Force ÷ Surface</div>
      <div class="fc-simple">Plus on appuie fort (F grand) sur une petite surface (S petit), plus la pression est élevée. C'est pour ça qu'une aiguille pique alors qu'une main qui pousse pareil ne pique pas : même force, surface différente.</div>
    </div>

    <div class="formula-card">
      <div class="fc-context">Conversion d'unités</div>
      <div class="fc-name">PSI ↔ BAR</div>
      <div class="fc-formula">1 PSI = 0,069 bar &nbsp;|&nbsp; 1 bar = 14,5 PSI</div>
      <div class="fc-simple">Pour passer de PSI à bar, on multiplie par 0,069. Pour passer de bar à PSI, on divise par 0,069 (ou on multiplie par 14,5).</div>
      <div class="fc-examples">
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple 1 — PSI → bar</span>
          <span class="fc-ex-calc">200 PSI → 200 × 0,069</span><br>
          <span class="fc-ex-result">= 13,8 bar</span>
        </div>
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple 2 — bar → PSI</span>
          <span class="fc-ex-calc">207 bar → 207 ÷ 0,069</span><br>
          <span class="fc-ex-result">≈ 3 000 PSI</span>
        </div>
      </div>
    </div>

    <div class="formula-card">
      <div class="fc-context">Tuyauteries — sécurité</div>
      <div class="fc-name">Pe et Pr à partir de Pn</div>
      <div class="fc-formula">Pe = 2 × Pn &nbsp;&nbsp;|&nbsp;&nbsp; Pr = 4 × Pn</div>
      <div class="fc-simple">Pn = pression normale d'utilisation. La tuyauterie doit pouvoir supporter le double (Pe, épreuve, sans fuite) et le quadruple (Pr, rupture, avant de casser) de cette pression normale. C'est une marge de sécurité.</div>
      <div class="fc-examples">
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple</span>
          <span class="fc-ex-calc">Pn = 100 bar → Pe = 2×100 = 200 bar → Pr = 4×100 = 400 bar</span><br>
          <span class="fc-ex-result">Doit tenir jusqu'à 400 bar avant de casser</span>
        </div>
      </div>
    </div>

    <!-- ─── COUPLE DE SERRAGE ─── -->
    <div class="fgroup-title">🔧 Couple de serrage (torquage)</div>

    <div class="formula-card">
      <div class="fc-context">Principe de base</div>
      <div class="fc-name">C = F × L</div>
      <div class="fc-formula">Couple = Force × Longueur de la clé</div>
      <div class="fc-simple">C'est comme une balançoire : plus le bras de levier (L, la longueur de la clé) est long, moins il faut pousser fort (F) pour obtenir le même effet de serrage (C). Le couple C doit rester le même quel que soit l'outil utilisé.</div>
      <div class="fc-examples">
        <div class="fc-ex">
          <span class="fc-ex-label">À retenir</span>
          <span class="fc-ex-calc">Si on ajoute une rallonge à la clé (donc L change), il faut recalculer F pour garder le même C, sinon on serre trop ou pas assez.</span>
        </div>
      </div>
    </div>

    <div class="formula-card">
      <div class="fc-context">Conversion d'unités de couple</div>
      <div class="fc-name">N.m ↔ In.lbf / Ft.lbf</div>
      <div class="fc-formula">1 N.m = 8,8507 In.lbf &nbsp;|&nbsp; 1 Ft.lbf ≈ 0,737 N.m... (sens inverse)</div>
      <div class="fc-simple">Pour passer de N.m à In.lbf, on multiplie par environ 8,85. Pour passer de Ft.lbf à N.m, on divise par 0,737.</div>
      <div class="fc-examples">
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple 1 — N.m → In.lbf</span>
          <span class="fc-ex-calc">95 N.m → 95 × 8,847</span><br>
          <span class="fc-ex-result">≈ 840,5 In.lbf</span>
        </div>
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple 2 — Ft.lbf → N.m</span>
          <span class="fc-ex-calc">70 Ft.lbf → 70 ÷ 0,737</span><br>
          <span class="fc-ex-result">≈ 94,98 N.m</span>
        </div>
        <div class="fc-ex">
          <span class="fc-ex-label">Astuce N.m → m.Da.N</span>
          <span class="fc-ex-calc">On avance la virgule d'un rang (division approximative par 10)</span>
        </div>
      </div>
    </div>

    <!-- ─── DISTANCE & VITESSE ─── -->
    <div class="fgroup-title">🛩️ Distance & vitesse</div>

    <div class="formula-card">
      <div class="fc-context">Navigation aéronautique</div>
      <div class="fc-name">Mille nautique & nœuds</div>
      <div class="fc-formula">1 Nmi = 1,852 km &nbsp;|&nbsp; 1 Kt = 1,852 km/h</div>
      <div class="fc-simple">Le nœud (Kt) est l'unité de vitesse en aviation. Pour passer de nœuds à km/h, on multiplie par 1,852. Pour l'inverse, on divise par 1,852.</div>
      <div class="fc-examples">
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple 1 — Kt → km/h</span>
          <span class="fc-ex-calc">440 Kt → 440 × 1,852</span><br>
          <span class="fc-ex-result">≈ 814,9 km/h</span>
        </div>
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple 2 — km/h → Kt</span>
          <span class="fc-ex-calc">400 km/h → 400 ÷ 1,852</span><br>
          <span class="fc-ex-result">≈ 216 Kt</span>
        </div>
      </div>
    </div>

    <!-- ─── CARBURANT ─── -->
    <div class="fgroup-title">⛽ Carburant</div>

    <div class="formula-card">
      <div class="fc-context">Masse de carburant à bord</div>
      <div class="fc-name">Masse = Volume × Densité</div>
      <div class="fc-formula">m = V × d</div>
      <div class="fc-simple">Le carburant est mesuré en litres (volume), mais ce qui compte pour le poids de l'avion c'est sa masse en tonnes. On multiplie le volume par la densité du carburant (souvent environ 0,8).</div>
      <div class="fc-examples">
        <div class="fc-ex">
          <span class="fc-ex-label">Exemple</span>
          <span class="fc-ex-calc">23 860 L × densité 0,8 = 23 860 × 0,8</span><br>
          <span class="fc-ex-result">≈ 19 tonnes</span>
        </div>
      </div>
    </div>

    <!-- ─── TABLEAU RÉCAP UNITÉS ─── -->
    <div class="fgroup-title">📋 Tableau récap — toutes les unités</div>
    <div class="card">
      <table class="mini-table">
        <tr><th>Grandeur</th><th>Unités</th><th>Conversion clé</th></tr>
        <tr><td>Longueur</td><td class="mono">in / ft / mm / m</td><td>1 in = 25,4 mm · 1 ft = 12 in = 0,3048 m</td></tr>
        <tr><td>Pression</td><td class="mono">PSI / bar</td><td>1 PSI = 0,069 bar</td></tr>
        <tr><td>Couple</td><td class="mono">N.m / In.lbf / Ft.lbf / m.Da.N</td><td>1 N.m ≈ 8,85 In.lbf</td></tr>
        <tr><td>Distance</td><td class="mono">km / Nmi</td><td>1 Nmi = 1,852 km</td></tr>
        <tr><td>Vitesse</td><td class="mono">km/h / Kt</td><td>1 Kt = 1,852 km/h</td></tr>
        <tr><td>Masse carburant</td><td class="mono">L → tonnes</td><td>masse = volume × densité (≈0,8)</td></tr>
      </table>
    </div>

    <div class="warn">
      <span class="warn-title">💡 Méthode anti-stress pour le contrôle</span>
      Si tu ne te souviens pas du sens de la conversion (multiplier ou diviser), regarde l'<strong>ordre de grandeur</strong> du résultat attendu. Exemple : 1 inch = 25,4 mm → un pouce est PLUS GRAND qu'un mm, donc pour passer de pouces à mm, le nombre doit <strong>augmenter</strong> → on multiplie. Si le résultat doit être plus petit, on divise. Ce réflexe permet de vérifier si on a fait l'opération dans le bon sens.
    </div>
  </div>

  <!-- ════════════ SÉCURITÉ ATELIER ════════════ -->
  <div class="section acc-secu" id="secu">
    <div class="section-head">
      <div class="section-icon icon-secu">🛡️</div>
      <h2>Sécurité de l'atelier</h2>
      <span class="session-tag">27.05</span>
    </div>

    <div class="card">
      <h3>Les bases</h3>
      <ul>
        <li>Toujours appliquer les <strong>bonnes postures</strong> pour le port de charges (dos droit, jambes fléchies)</li>
        <li><strong>Électricité</strong> : au-delà de 30 mA → risque de paralysie respiratoire</li>
      </ul>
    </div>

    <div class="card">
      <h3>Triangle du feu</h3>
      <p>Un incendie nécessite 3 éléments réunis simultanément :</p>
      <div class="tagrow">
        <span class="tag tag-orange">Combustible (papier, bois, carburant)</span>
        <span class="tag tag-blue">Comburant (oxygène)</span>
        <span class="tag tag-red">Chaleur (étincelle, flamme, pression forte)</span>
      </div>
      <div class="def">
        <span class="def-title">Comburant <span class="def-badge">définition</span></span>
        Substance qui permet la combustion en réagissant avec le combustible — le plus souvent l'oxygène de l'air. Sans comburant, pas de flamme possible, même avec du combustible et de la chaleur.
      </div>
    </div>

    <div class="card">
      <h3>Que faire en cas d'incendie ?</h3>
      <ul>
        <li><strong>1.</strong> Se mettre à l'abri</li>
        <li><strong>2.</strong> Alerter</li>
        <li><strong>3.</strong> Évacuer ou faire évacuer</li>
        <li><strong>4.</strong> Si possible, attaquer le feu</li>
        <li><strong>5.</strong> S'assurer que tout le monde a évacué</li>
      </ul>
    </div>

    <div class="card">
      <h3>Dangers cachés</h3>
      <p>Invisibles et/ou silencieux — toujours rester vigilant :</p>
      <div class="tagrow">
        <span class="tag tag-gray">Hélices</span>
        <span class="tag tag-gray">Bruits</span>
        <span class="tag tag-gray">Ondes radars</span>
        <span class="tag tag-gray">Souffle des réacteurs</span>
        <span class="tag tag-gray">Radiographie</span>
      </div>
    </div>

    <div class="card">
      <h3>Code couleur des panneaux</h3>
      <table class="mini-table">
        <tr><th>Couleur</th><th>Signification</th></tr>
        <tr><td class="mono" style="color:#4fc3f7">Bleu</td><td>Obligation</td></tr>
        <tr><td class="mono" style="color:#ffd54f">Jaune</td><td>Avertissement / Sensibilisation</td></tr>
        <tr><td class="mono" style="color:#ff6b5e">Rouge barré</td><td>Interdiction</td></tr>
        <tr><td class="mono" style="color:#ff6b5e">Carré rouge</td><td>Danger incendie</td></tr>
        <tr><td class="mono" style="color:#4dd0a7">2 types de vert</td><td>Secours et évacuation</td></tr>
      </table>
    </div>

    <div class="card">
      <h3>📌 Résumé à retenir</h3>
      <ul>
        <li>Prévenir en traitant les <strong>situations à risque et quasi-accidents</strong> en amont</li>
        <li>Identifier les dangers cachés (électricité, hydraulique, carburant, feu, souffle, bruit, rayonnements)</li>
        <li>Appliquer procédures / EPI / consignation et repérer la signalisation, ZEC et points de secours</li>
      </ul>
      <div class="def">
        <span class="def-title">ZEC <span class="def-badge">définition</span></span>
        Zone d'Évolution Contrôlée — zone délimitée dans l'atelier ou sur l'avion où l'accès et les déplacements sont réglementés pour des raisons de sécurité (travaux en cours, risques spécifiques).
      </div>
    </div>
  </div>

  <!-- ════════════ MESURES & CALCULS ════════════ -->
  <div class="section acc-mesure" id="mesure">
    <div class="section-head">
      <div class="section-icon icon-mesure">📐</div>
      <h2>Mesures & calculs aéronautiques</h2>
      <span class="session-tag">29.05 – 04.06</span>
    </div>

    <div class="card">
      <h3>Conversion pouces ↔ mm</h3>
      <p>L'aéronautique mélange système métrique et système impérial (pouces). Il faut savoir convertir dans les deux sens.</p>
      <div class="calc">
        <span class="calc-label">Conversion de base</span>
        <div class="calc-formula">1 inch (pouce) = 25,4 mm</div>
        <div class="calc-steps">
          <div class="calc-step"><span class="step-num">EX</span> Convertir 7/8 de pouce en mm</div>
          <div class="calc-step"><span class="step-num">→</span> 25,4 × (7/8) = 25,4 × 0,875</div>
        </div>
        <div class="calc-result">Résultat : <span>22,225 mm</span></div>
      </div>
      <div class="calc">
        <span class="calc-label">Autre exemple — nombre mixte</span>
        <div class="calc-formula">1'3/4 = 1 pouce + 3/4 de pouce</div>
        <div class="calc-steps">
          <div class="calc-step"><span class="step-num">→</span> 25,4 (pour le "1") + (3/4 × 25,4) pour le "3/4"</div>
          <div class="calc-step"><span class="step-num">→</span> 25,4 + 19,05</div>
        </div>
        <div class="calc-result">Résultat : <span>44,45 mm</span></div>
      </div>
    </div>

    <div class="card">
      <h3>Pieds ↔ mètres</h3>
      <div class="calc">
        <span class="calc-label">Conversions de base</span>
        <div class="calc-formula">1 foot (pied) = 12 inches = 304,8 mm = 0,3048 m</div>
        <div class="calc-steps">
          <div class="calc-step"><span class="step-num">EX</span> Convertir 5000 ft en mètres</div>
          <div class="calc-step"><span class="step-num">→</span> 0,3048 × 5000</div>
        </div>
        <div class="calc-result">Résultat : <span>1 524 m</span></div>
      </div>
    </div>

    <div class="card">
      <h3>Lire une clé en pouces ("inch scale")</h3>
      <p>Pour identifier la taille exacte d'une clé/vis en pouces, on utilise une <strong>règle à dash</strong> et une logique de simplification de fraction.</p>
      <div class="calc">
        <span class="calc-label">Règle de simplification</span>
        <div class="calc-formula">Si le 1er chiffre est pair → on divise jusqu'à obtenir un chiffre impair</div>
        <div class="calc-steps">
          <div class="calc-step"><span class="step-num">EX 1</span> 4/16 → on divise par 2 → 2/8</div>
          <div class="calc-step"><span class="step-num">→</span> 2 est encore pair → on divise encore par 2 → 1/4</div>
          <div class="calc-step"><span class="step-num">✓</span> 1 est impair → on s'arrête : <strong>1/4</strong></div>
        </div>
      </div>
      <div class="calc">
        <span class="calc-label">Cas avec un nombre supérieur à 16/16 (1 pouce)</span>
        <div class="calc-formula">16/16 = 1 inch (pouce entier)</div>
        <div class="calc-steps">
          <div class="calc-step"><span class="step-num">EX 2</span> 18/16 = 16/16 + 2/16 (les 2 unités au-dessus de 16)</div>
          <div class="calc-step"><span class="step-num">→</span> On simplifie 2/16 → divisé par 2 → 1/8</div>
        </div>
        <div class="calc-result">Résultat : <span>1 inch + 1/8</span></div>
      </div>
      <div class="def">
        <span class="def-title">Ordre de procédure complet <span class="def-badge">méthode</span></span>
        1) Définir la taille de la clé (cote sur pans, filetage, partie lisse) avec un pied à coulisse — 2) Utiliser la règle à dash pour mesurer l'écart (inch scale) — 3) Utiliser la clé plate dédiée correspondante.
      </div>
    </div>

    <div class="card">
      <h3>Désignations Sellers (US) — exemples</h3>
      <table class="mini-table">
        <tr><th>Désignation</th><th>Signification</th></tr>
        <tr><td class="mono">NAS 5048-7-14</td><td>7 = diamètre en 16ᵉ de pouce (7/16) · 14 = partie lisse en 16ᵉ de pouce (14/16 = 7/8)</td></tr>
        <tr><td class="mono">3/8 - 24</td><td>3/8 = diamètre en pouces · 24 = nombre de filets par pouce</td></tr>
      </table>
      <div class="warn">
        <span class="warn-title">⚠ À retenir</span>
        Le diamètre d'une vis se prend toujours sur la <strong>partie filetée</strong>, jamais sur la tête ni sur une autre zone.
      </div>
    </div>

    <div class="card">
      <h3>Classement d'outils par taille croissante (base 32)</h3>
      <p>Pour comparer des clés de fractions différentes, on les ramène toutes au même dénominateur (ici 32, le plus grand dénominateur commun rencontré).</p>
      <table class="mini-table">
        <tr><th>Fraction</th><th>En 32ᵉ</th></tr>
        <tr><td class="mono">1/4</td><td>8/32</td></tr>
        <tr><td class="mono">5/16</td><td>10/32</td></tr>
        <tr><td class="mono">13/32</td><td>13/32</td></tr>
        <tr><td class="mono">7/16</td><td>14/32</td></tr>
        <tr><td class="mono">1/2</td><td>16/32</td></tr>
        <tr><td class="mono">9/16</td><td>18/32</td></tr>
        <tr><td class="mono">3/4</td><td>26/32</td></tr>
        <tr><td class="mono">7/8</td><td>28/32</td></tr>
      </table>
      <div class="calc">
        <span class="calc-label">Comment trouver 7/8 → 28/32 ?</span>
        <div class="calc-steps">
          <div class="calc-step"><span class="step-num">1</span> Trouver le facteur qui transforme le dénominateur 8 en 32 → 8 × 4 = 32</div>
          <div class="calc-step"><span class="step-num">2</span> Appliquer le même facteur au numérateur → 7 × 4 = 28</div>
        </div>
        <div class="calc-result">Résultat : <span>7/8 = 28/32</span></div>
      </div>
    </div>

    <div class="card">
      <h3>Pression : PSI ↔ BAR</h3>
      <div class="def">
        <span class="def-title">Formule de pression <span class="def-badge">physique</span></span>
        P = F / S → la Pression est égale à la Force (en pound/livre) divisée par la Surface (en square inch). C'est le principe : plus on applique une force sur une petite surface, plus la pression est élevée.
      </div>
      <div class="calc">
        <span class="calc-label">Conversions de base</span>
        <div class="calc-formula">1 PSI = 0,069 BAR &nbsp;|&nbsp; 1 BAR = 14,5 PSI</div>
        <div class="calc-steps">
          <div class="calc-step"><span class="step-num">EX 1</span> Convertir 200 PSI en BAR → 200 × 0,069</div>
        </div>
        <div class="calc-result">Résultat : <span>13,8 BAR</span></div>
        <div class="calc-steps" style="margin-top:10px;">
          <div class="calc-step"><span class="step-num">EX 2</span> Convertir 207 BAR en PSI → 207 / 0,069</div>
        </div>
        <div class="calc-result">Résultat : <span>≈ 3 000 PSI</span></div>
      </div>
    </div>

    <div class="card">
      <h3>Couple de serrage (Torquage)</h3>
      <div class="def">
        <span class="def-title">Principe d'utilisation <span class="def-badge">à retenir</span></span>
        Tous les écrous et vis serrés avec une clé de longueur <strong>L</strong> et une force <strong>F</strong> seront serrés avec la même intensité de couple, quel que soit l'outil utilisé — c'est le couple final qui compte, pas l'outil.
      </div>
      <div class="calc">
        <span class="calc-label">Formule du couple</span>
        <div class="calc-formula">C = F × L</div>
        <div class="calc-steps">
          <div class="calc-step"><span class="step-num">C</span> Couple (le résultat recherché)</div>
          <div class="calc-step"><span class="step-num">F</span> Force appliquée sur la clé</div>
          <div class="calc-step"><span class="step-num">L</span> Longueur de la clé (bras de levier)</div>
        </div>
        <div class="warn" style="margin-top:10px;">
          <span class="warn-title">⚠ Cas particulier — Rallonge</span>
          Si on ajoute une rallonge (L1) à la clé, la longueur totale change → il faut <strong>recalculer la force à appliquer</strong> pour obtenir le même couple final, sinon on risque de sur-serrer ou sous-serrer.
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Conversions de couple — unités</h3>
      <p>Trois familles d'unités de couple existent : <strong>In.lbf</strong> (Inch pound), <strong>Ft.lbf</strong> (Foot pound) et <strong>m.Da.N</strong> (mètre Déca Newton).</p>
      <div class="calc">
        <span class="calc-label">N.m → In.lbf</span>
        <div class="calc-formula">1 N.m = 8,8507 In.lbf</div>
        <div class="calc-steps">
          <div class="calc-step"><span class="step-num">EX</span> 95 N.m → 95 × 8,847</div>
        </div>
        <div class="calc-result">Résultat : <span>≈ 840,5 In.lbf</span></div>
      </div>
      <div class="calc">
        <span class="calc-label">Ft.lbf → N.m</span>
        <div class="calc-steps">
          <div class="calc-step"><span class="step-num">EX</span> 70 Ft.lbf → 70 / 0,737</div>
        </div>
        <div class="calc-result">Résultat : <span>≈ 94,98 N.m</span></div>
      </div>
      <div class="def">
        <span class="def-title">Astuce de conversion rapide N.m → m.Da.N</span>
        Pour passer de N.m à m.Da.N, il suffit de déplacer la virgule d'un rang (diviser par 10 environ selon le facteur exact, soit avancer la virgule d'une unité).
      </div>
    </div>

    <div class="card">
      <h3>Distance & Vitesse aéronautiques</h3>
      <div class="calc">
        <span class="calc-label">Mille nautique et nœuds</span>
        <div class="calc-formula">1 Mille nautique (Nmi) = 1,852 km &nbsp;|&nbsp; 1 nœud (Kt) = 1,852 km/h</div>
        <div class="calc-steps">
          <div class="calc-step"><span class="step-num">EX 1</span> 440 Kt en km/h → 440 × 1,852</div>
        </div>
        <div class="calc-result">Résultat : <span>≈ 814,9 km/h</span></div>
        <div class="calc-steps" style="margin-top:10px;">
          <div class="calc-step"><span class="step-num">EX 2</span> 400 km/h en Kt → 400 / 1,852</div>
        </div>
        <div class="calc-result">Résultat : <span>≈ 216 Kt</span></div>
      </div>
    </div>

    <div class="card">
      <h3>📌 Tableau récap des unités</h3>
      <table class="mini-table">
        <tr><th>Grandeur</th><th>Unités</th></tr>
        <tr><td>Mesure (longueur)</td><td class="mono">in / ft (pouce / pied)</td></tr>
        <tr><td>Pression</td><td class="mono">PSI / BAR</td></tr>
        <tr><td>Couple de serrage</td><td class="mono">N.m / m.Da.N / In.lbf / Ft.lbf</td></tr>
        <tr><td>Distance</td><td class="mono">km / Nmi (mille nautique)</td></tr>
        <tr><td>Vitesse</td><td class="mono">km/h / Kt (nœud)</td></tr>
      </table>
    </div>

    <div class="card">
      <h3>📌 Organisation d'une vacation</h3>
      <ul>
        <li><strong>1.</strong> S'informer du travail (Quoi ? Pourquoi ?)</li>
        <li><strong>2.</strong> Vérifier que la tâche est réalisable</li>
        <li><strong>3.</strong> Analyser la documentation (AMM)</li>
        <li><strong>4.</strong> Récupérer l'outillage spécifique et les ingrédients nécessaires</li>
        <li><strong>5.</strong> Sécuriser l'espace de travail (étiquettes de travail)</li>
        <li><strong>6.</strong> Organiser son espace de travail</li>
        <li><strong>7.</strong> Dépose (removal) + repérage</li>
        <li><strong>8.</strong> Boucher les orifices avec les bouchons adaptés</li>
        <li><strong>9.</strong> Repose (installation)</li>
        <li><strong>10.</strong> Réitération / réitération croisée</li>
        <li><strong>11.</strong> Essais + contrôle final</li>
        <li><strong>12.</strong> Nettoyage de l'espace de travail</li>
        <li><strong>13.</strong> Retrait des étiquettes de danger</li>
        <li><strong>14.</strong> Signature du travail réalisé (traçabilité)</li>
      </ul>
    </div>
  </div>

  <div class="section acc-facteur" id="facteur">
    <div class="section-head">
      <div class="section-icon icon-facteur">🧠</div>
      <h2>Facteurs humains</h2>
      <span class="session-tag">29.05</span>
    </div>

    <div class="card">
      <h3>Chiffres clés</h3>
      <ul>
        <li>La maintenance est impliquée dans <strong>4% des accidents/crash</strong></li>
        <li><strong>80% des accidents</strong> (en général) sont liés aux facteurs humains</li>
      </ul>
      <div class="def">
        <span class="def-title">Erreur humaine <span class="def-badge">définition</span></span>
        Écart involontaire entre ce qui a été fait et ce qui était voulu ou demandé — par opposition à la violation, qui est volontaire.
      </div>
    </div>

    <div class="card">
      <h3>Les 3 types d'erreurs</h3>
      <ul>
        <li><strong>Erreur de connaissance</strong> — on ne sait pas comment faire</li>
        <li><strong>Erreur de règle</strong> — on applique mal une procédure connue</li>
        <li><strong>Erreur de routine</strong> — geste automatique qui dérape (inattention, fatigue)</li>
      </ul>
    </div>

    <div class="card">
      <h3>Culture "Just & Fair" (Air France)</h3>
      <p>Charte signée par Air France : <strong>les erreurs sont pardonnées</strong> afin de comprendre pourquoi elles se produisent. Cela permet de limiter la répétition de cette erreur par d'autres personnes.</p>
      <div class="warn">
        <span class="warn-title">⚠ Limite importante</span>
        Pour les <strong>violations</strong> (erreurs volontaires), la culture "Just & Fair" ne s'applique plus → sanction possible (mise à pied).
      </div>
      <p style="margin-top:10px;"><strong>L'assurance pour le travailleur, c'est le respect des procédures !</strong></p>
    </div>

    <div class="card">
      <h3>Modèle SHELL</h3>
      <p>Modèle utilisé pour analyser les interactions entre l'humain et son environnement de travail :</p>
      <table class="mini-table">
        <tr><th>Lettre</th><th>Signification</th></tr>
        <tr><td class="mono">S</td><td>Soft — données, procédures, logiciels</td></tr>
        <tr><td class="mono">H</td><td>Hard — matériel, outils, équipements</td></tr>
        <tr><td class="mono">E</td><td>Environment — environnement de travail</td></tr>
        <tr><td class="mono">L L</td><td>Lifeware/Lives — notre vie et celle des autres (le facteur humain central)</td></tr>
      </table>
      <p>Modèle régi par l'<strong>OACI</strong> (Organisation de l'Aviation Civile Internationale).</p>
    </div>

    <div class="card">
      <h3>Sécurité organisationnelle — Modèle de Reason</h3>
      <div class="def">
        <span class="def-title">Modèle de Reason (modèle du "fromage suisse") <span class="def-badge">complété</span></span>
        Modèle développé par James Reason qui représente les défenses d'un système (procédures, contrôles, formations) comme des tranches de fromage suisse percées de trous. Un accident survient seulement quand les "trous" (failles) de plusieurs tranches s'alignent en même temps, laissant passer l'erreur jusqu'à l'accident. Il montre que les accidents résultent rarement d'une seule cause, mais d'un enchaînement de petites failles latentes.
      </div>
    </div>

    <div class="card">
      <h3>Limite légale d'exposition au bruit</h3>
      <div class="calc">
        <span class="calc-label">Seuil réglementaire</span>
        <div class="calc-formula">85 dB</div>
        <p style="margin-top:8px;">Au-delà de ce seuil d'exposition prolongée, le risque de lésion auditive devient significatif — d'où l'obligation de protections auditives en zone bruyante (réacteurs, GPU, outillage pneumatique).</p>
      </div>
    </div>
  </div>

  <div class="section acc-doc" id="doc">
    <div class="section-head">
      <div class="section-icon icon-doc">📄</div>
      <h2>Documentation technique</h2>
      <span class="session-tag">01.06 – 03.06</span>
    </div>

    <div class="card">
      <h3>Dessin technique (CATIA & alternatives)</h3>
      <ul>
        <li><strong>CATIA</strong> : logiciel utilisé en aéronautique pour le dessin graphique (CAO)</li>
        <li><strong>Solidworks</strong> : alternative moins chère</li>
        <li><strong>Onshape</strong> : alternative gratuite</li>
      </ul>
      <div class="grid2">
        <div class="grid-card">
          <div class="gc-title">Dessin d'ensemble</div>
          <p>Hachures, repères numérotés, plusieurs pièces. <strong>Jamais de cotation</strong> (mesures/dimensions).</p>
        </div>
        <div class="grid-card">
          <div class="gc-title">Dessin de définition</div>
          <p>Représente une seule pièce, <strong>avec cotation</strong> (mesures précises).</p>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Les manuels constructeur</h3>
      <table class="mini-table">
        <tr><th>Sigle</th><th>Signification</th></tr>
        <tr><td class="mono">SRM</td><td>Structural Repair Manual</td></tr>
        <tr><td class="mono">AMM</td><td>Airplane Maintenance Manual</td></tr>
        <tr><td class="mono">FIM / TSM</td><td>Fault Isolation / Trouble Shooting Manual</td></tr>
        <tr><td class="mono">SSM</td><td>System Schematics Manual</td></tr>
        <tr><td class="mono">WDM</td><td>Wiring Diagram Manual</td></tr>
        <tr><td class="mono">IPC</td><td>Illustrated Parts Catalog</td></tr>
        <tr><td class="mono">SWPM</td><td>Standard Wiring Practices Manual</td></tr>
      </table>
      <p style="margin-top:8px;"><strong>Synoptique électrique</strong> = schéma électrique de l'ensemble de l'avion.</p>
    </div>

    <div class="card">
      <h3>Objectif & norme ATA iSpec 2200</h3>
      <p><strong>Objectif de la doc technique</strong> : mener à bien les opérations techniques en rapport avec les opérations liées à l'avion.</p>
      <div class="def">
        <span class="def-title">ATA iSpec 2200</span>
        Standardisation de la documentation technique définie par les constructeurs. Permet aussi aux constructeurs d'obtenir et de maintenir leurs agréments auprès des autorités.
      </div>
      <p style="margin-top:8px;">Deux grandes catégories à retenir : <strong>"maintenance practices"</strong> et <strong>"airframe systems"</strong>.</p>
    </div>

    <div class="card">
      <h3>Pourquoi la doc est indispensable</h3>
      <p>La complexité des avions actuels impose que la maintenance dispose de <strong>toutes les informations nécessaires</strong> avant toute intervention.</p>
      <h3 style="margin-top:14px;">Règles de la documentation</h3>
      <ul>
        <li>Agrément des autorités de l'aviation civile de chaque pays</li>
        <li>Révision par mises à jour (MàJ)</li>
        <li>Rédigée en anglais</li>
        <li>Organisée par type de document</li>
      </ul>
    </div>

    <div class="card">
      <h3>Effectivité de la documentation</h3>
      <div class="def">
        <span class="def-title">Effectivité</span>
        La doc est reliée à un avion précis. Exemple : la documentation d'un A320 d'avant les années 2000 sera différente de celle d'un A320 actuel, car ce n'est pas le même avion (plus moderne, équipements différents).
      </div>
      <div class="warn">
        <span class="warn-title">⚠ Règle d'or</span>
        Ne jamais sortir une documentation "au pif" — il est indispensable de s'assurer que la doc correspond bien à l'aéronef nécessitant les travaux.
      </div>
      <p style="margin-top:8px;">L'identification se fait via le <strong>numéro de série constructeur</strong> et <strong>l'immatriculation</strong> de l'avion.</p>
    </div>

    <div class="card">
      <h3>WARNING vs CAUTION</h3>
      <div class="grid2">
        <div class="grid-card">
          <div class="gc-title" style="color:var(--c-secu)">WARNING</div>
          <p>Danger pour <strong>l'être humain</strong> — risque de blessure du personnel.</p>
        </div>
        <div class="grid-card">
          <div class="gc-title" style="color:var(--c-facteur)">CAUTION</div>
          <p>Danger pour <strong>le matériel</strong> — risque de dégâts sur équipements/avion.</p>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>MEL — Minimum Equipment List</h3>
      <p>Permet d'utiliser un aéronef avec certains équipements ou systèmes <strong>inopérants</strong>, sous réserve de maintenir le niveau de sécurité des vols.</p>
    </div>

    <div class="card">
      <h3>ATA 20 — Standard Practices</h3>
      <p>Application rigoureuse des méthodes de travail = <strong>la "règle de l'art"</strong> en maintenance aéronautique.</p>
    </div>

    <div class="card">
      <h3>IPC — Illustrated Parts Catalog</h3>
      <p>But : identifier et référencer tous les éléments démontables ou interchangeables de l'avion, et rechercher la référence des matières premières (joints, tuyauteries rigides, etc.).</p>
      <div class="grid2">
        <div class="grid-card">
          <div class="gc-title">AIPC</div>
          <p>Aircraft Illustrated Parts Catalog — pièces avion.</p>
        </div>
        <div class="grid-card">
          <div class="gc-title">PIPC</div>
          <p>Powerplant Illustrated Parts Catalog — pièces moteur (2ᵉ partie de l'IPC).</p>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>TSM / FIM, ASM / AIB, AWM / WDM</h3>
      <ul>
        <li><strong>TSM (Airbus) / FIM (Boeing)</strong> — Isoler et corriger les pannes connues. Permet de diriger les mécaniciens vers une procédure de dépannage.</li>
        <li><strong>ASM (Airbus) / AIB (Boeing)</strong> — Représenter tous les éléments nécessaires à la compréhension d'un circuit électrique, en détaillant l'intérieur d'un équipement. → <strong>Schéma de principe</strong></li>
        <li><strong>AWM (Airbus) / WDM (Boeing)</strong> — Identifier câbles et interconnexions, renseigner sur la position des éléments, permettre le dépannage par un opérateur connaissant le schéma de principe. → <strong>Schéma de câblage</strong></li>
      </ul>
    </div>

    <div class="card">
      <h3>Carnets de bord</h3>
      <table class="mini-table">
        <tr><th>Sigle</th><th>Utilisateurs</th></tr>
        <tr><td class="mono">ATL</td><td>Aircraft Technical Logbook — Pilotes</td></tr>
        <tr><td class="mono">ACL</td><td>Aircraft Cabin Logbook — Hôtesses, stewards</td></tr>
      </table>
    </div>

    <div class="card">
      <h3>SRM — Structural Repair Manual</h3>
      <p>Permet les réparations sur la structure de l'aéronef et de vérifier s'il y a des impacts <strong>en tolérance</strong> ou <strong>hors tolérance</strong>.</p>
    </div>

    <div class="card">
      <h3>Dirty Dozen — 12 facteurs humains à risque</h3>
      <p>Les 12 facteurs identifiés comme principales causes d'erreurs en maintenance aéronautique, représentant la <strong>contribution humaine à la chaîne de sécurité des vols</strong>.</p>
      <div class="def">
        <span class="def-title">Liste des 12 facteurs <span class="def-badge">complété</span></span>
        Manque de communication, complaisance, manque de connaissance, distraction, manque de travail d'équipe, fatigue, manque de ressources, pression, manque d'assertivité, stress, manque de conscience de la situation, et normes/habitudes (normalisation de la déviance).
      </div>
    </div>

    <div class="card">
      <h3>ATA à connaître</h3>
      <table class="mini-table">
        <tr><th>ATA</th><th>Système</th></tr>
        <tr><td><span class="ata">20</span></td><td>Standard Practices</td></tr>
        <tr><td><span class="ata">25</span></td><td>Equipment and Furnishing — Cabin</td></tr>
        <tr><td><span class="ata">35</span></td><td>Oxygen</td></tr>
        <tr><td><span class="ata">37</span></td><td>Vacuum</td></tr>
        <tr><td><span class="ata">38</span></td><td>Water and Waste</td></tr>
      </table>
    </div>

    <div class="card">
      <h3>P/N et S/N</h3>
      <table class="mini-table">
        <tr><th>Sigle</th><th>Signification</th></tr>
        <tr><td class="mono">P/N ou PN</td><td>Part Number — référence de groupe/famille de pièce</td></tr>
        <tr><td class="mono">S/N ou SN</td><td>Serial Number — numéro de série unique d'une pièce</td></tr>
      </table>
    </div>

    <div class="card">
      <h3>MRO</h3>
      <div class="def">
        <span class="def-title">MRO <span class="def-badge">définition</span></span>
        Maintenance, Repair and Overhaul — entreprise ou activité de maintenance, réparation et révision d'aéronefs/équipements. Air France est un MRO.
      </div>
    </div>
  </div>

  <!-- ════════════ ANTI-FOD ════════════ -->
  <div class="section acc-fod" id="fod">
    <div class="section-head">
      <div class="section-icon icon-fod">🧹</div>
      <h2>Anti-FOD</h2>
      <span class="session-tag">03.06</span>
    </div>

    <div class="card">
      <h3>Qu'est-ce que le FOD ?</h3>
      <div class="def">
        <span class="def-title">FOD <span class="def-badge">définition</span></span>
        Foreign Object Damage / Débris — désigne les causes et conséquences liées à la présence d'objets/débris étrangers dans une zone de travail ou sur l'avion. C'est un enjeu central de la sécurité des vols (ingestion moteur, blocage de commandes, etc.).
      </div>
    </div>

    <div class="card">
      <h3>Méthode 5S (japonaise)</h3>
      <table class="mini-table">
        <tr><th>Étape</th><th>Signification</th></tr>
        <tr><td class="mono">SEIRI</td><td>Trier</td></tr>
        <tr><td class="mono">SEITON</td><td>Ranger / Organiser</td></tr>
        <tr><td class="mono">SEISO</td><td>Nettoyer</td></tr>
        <tr><td class="mono">SEIKETSU</td><td>Standardiser</td></tr>
        <tr><td class="mono">SHITSUKE</td><td>Maintenir / Discipliner</td></tr>
      </table>
    </div>

    <div class="card">
      <h3>Les 3 types de zones FOD</h3>
      <ul>
        <li><strong>Non sensible</strong> — zone sans risque de FOD → Plan 5S simple</li>
        <li><strong>Sensible</strong> — risque de FOD faible → Plan 5S + nettoyage renforcé + matériel conditionné + confinement + formation</li>
        <li><strong>Critique</strong> — risque de FOD fort → Plan 5S + nettoyage renforcé + matériel conditionné + confinement + formation + <strong>caisse anti-FOD</strong> + gestion des <strong>OLVT</strong> + vérification systématique de la zone d'intervention</li>
      </ul>
      <div class="def">
        <span class="def-title">OLVT <span class="def-badge">complété</span></span>
        Outils, Lests et Vêtements de Travail — ensemble du matériel personnel et des équipements amenés par le personnel dans une zone critique, dont la présence doit être contrôlée à l'entrée ET à la sortie pour éviter tout oubli pouvant générer un FOD.
      </div>
    </div>
  </div>

  <!-- ════════════ TECHNO SYSTÈME ════════════ -->
  <div class="section acc-techno" id="techno">
    <div class="section-head">
      <div class="section-icon icon-techno">✈️</div>
      <h2>Techno système — Avion & vocabulaire</h2>
      <span class="session-tag">08.06 – 10.06</span>
    </div>

    <div class="card">
      <h3>Vocabulaire de base de l'avion</h3>
      <table class="mini-table">
        <tr><th>Terme</th><th>Définition</th></tr>
        <tr><td><strong>Envergure</strong></td><td>Distance entre les deux extrémités des ailes (voilure)</td></tr>
        <tr><td><strong>Voie</strong></td><td>Distance séparant d'axe à axe les deux trains principaux</td></tr>
        <tr><td><strong>Garde</strong></td><td>Distance séparant le point le plus bas de l'avion du sol</td></tr>
        <tr><td><strong>Empattement</strong></td><td>Distance séparant l'axe du train avant de l'axe joignant les trains principaux</td></tr>
      </table>
    </div>

    <div class="card">
      <h3>Voilure & empennages</h3>
      <table class="mini-table">
        <tr><th>Terme</th><th>Définition</th></tr>
        <tr><td><strong>Empennage vertical / dérive</strong></td><td>Élément stabilisateur de l'axe de lacet</td></tr>
        <tr><td><strong>Empennage horizontal / stabilisateur</strong></td><td>Élément stabilisateur de l'axe de tangage</td></tr>
        <tr><td><strong>Saumon d'aile</strong></td><td>Partie extrême de chaque aile</td></tr>
        <tr><td><strong>Emplanture d'aile</strong></td><td>Zone de fixation de la voilure sur l'aéronef</td></tr>
        <tr><td><strong>Bord d'attaque</strong></td><td>Partie avant de l'aile qui "attaque" les filets d'air</td></tr>
        <tr><td><strong>Bord de fuite</strong></td><td>Partie arrière par laquelle les filets d'air "s'enfuient"</td></tr>
        <tr><td><strong>Extrados</strong></td><td>Partie supérieure de l'aile (le dessus)</td></tr>
        <tr><td><strong>Intrados</strong></td><td>Partie inférieure de l'aile (le dessous)</td></tr>
      </table>
    </div>

    <div class="card">
      <h3>Les 4 forces fondamentales</h3>
      <ul>
        <li><strong>Traînée</strong> — résistance de l'air à l'avancée de l'avion</li>
        <li><strong>Traction</strong> — produite par l'hélice, directement opposée à la traînée (s'appelle "poussée" pour un GTR)</li>
        <li><strong>Portance</strong> — force qui porte l'avion</li>
      </ul>
      <div class="def">
        <span class="def-title">GTR <span class="def-badge">définition</span></span>
        Groupe TurboRéacteur — type de moteur à réaction utilisé sur la majorité des avions de ligne modernes.
      </div>
    </div>

    <div class="card">
      <h3>Classification des structures</h3>
      <ul>
        <li><strong>Primaire (PSE)</strong> — Principal Structural Equipment : structure vitale, ossature sans laquelle l'avion ne peut pas voler</li>
        <li><strong>Secondaire</strong> — éléments qui servent à l'évolution de l'avion et à la modification de son aérodynamisme (carénage, gouverne)</li>
        <li><strong>Tertiaire</strong> — tout ce qui a trait à la cabine</li>
      </ul>
    </div>

    <div class="card">
      <h3>ATA 24 — Génération électrique</h3>
      <div class="grid2">
        <div class="grid-card">
          <div class="gc-title" style="color:var(--c-fod)">Avantages</div>
          <p>Facilité de stockage · facilité d'acheminement par fil et retour par la structure · contrôles aisés (multimètre) · souplesse de conversion (mécanique, calorifique, lumineuse) · capacité de surcharge au démarrage · protection simple (fusible, disjoncteur)</p>
        </div>
        <div class="grid-card">
          <div class="gc-title" style="color:var(--c-secu)">Inconvénients</div>
          <p>Risque d'incendie par court-circuit · risque d'électrocution · à puissance égale, le poids des équipements électriques est plus élevé que pour d'autres formes d'énergie</p>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Tensions utilisées à bord</h3>
      <p>Un avion a besoin de <strong>courant continu</strong>.</p>
      <div class="tagrow">
        <span class="tag tag-blue">28V DC (Direct Current)</span>
        <span class="tag tag-orange">115V AC (Alternative Current)</span>
      </div>
      <h3 style="margin-top:14px;">Sources d'énergie électrique (par ordre d'utilisation)</h3>
      <ul>
        <li>Alternateurs des moteurs</li>
        <li>Alternateur de l'APU</li>
        <li>Batterie</li>
        <li><strong>RAT</strong> — Ram Air Turbine (en cas d'urgence)</li>
        <li>Groupe de Parc au sol (<strong>GPU</strong>)</li>
      </ul>
      <div class="def">
        <span class="def-title">IDG</span>
        Integrated Drive Generator = Alternateur + CSD (Constant Speed Drive) — permet de produire un courant à fréquence stable malgré la vitesse variable du moteur.
      </div>
    </div>

    <div class="card">
      <h3>ATA 29 — Génération hydraulique</h3>
      <div class="grid2">
        <div class="grid-card">
          <div class="gc-title" style="color:var(--c-fod)">Avantages</div>
          <p>Bon rapport poids/puissance · énergie rapide (liquide considéré comme incompressible) · les fuites se repèrent facilement</p>
        </div>
        <div class="grid-card">
          <div class="gc-title" style="color:var(--c-secu)">Inconvénients</div>
          <p>Impose un circuit retour → augmentation du poids · liquide corrosif</p>
        </div>
      </div>
      <ul style="margin-top:10px;">
        <li>Le <strong>robinet coupe-feu</strong> se situe dans les mâts moteurs (pylon)</li>
        <li><strong>EDP</strong> — Engine Driven Pump (pompe entraînée par le moteur)</li>
        <li><strong>ACMP</strong> — Alternative Current Motor Pump (pompe électrique)</li>
      </ul>
    </div>

    <div class="card">
      <h3>ATA 36 — Génération pneumatique</h3>
      <div class="grid2">
        <div class="grid-card">
          <div class="gc-title" style="color:var(--c-fod)">Avantages</div>
          <p>Utilise un fluide léger et disponible en grande quantité (air) · pas de circuit retour</p>
        </div>
        <div class="grid-card">
          <div class="gc-title" style="color:var(--c-secu)">Inconvénients</div>
          <p>Générateurs à mauvais rendement · fuites fréquentes et difficilement repérables</p>
        </div>
      </div>
      <div class="warn">
        <span class="warn-title">⚠ Important</span>
        L'ATA 36 met en pression les ATA <strong>21, 29, 30 et 38</strong>.
      </div>
    </div>

    <div class="card">
      <h3>ATA 21 — Conditionnement d'air</h3>
      <ul>
        <li>Toutes les <strong>3 minutes</strong> → reconditionnement complet de l'air cabine</li>
        <li>Contrôle de température : aspect <strong>confort</strong> passager</li>
      </ul>
    </div>

    <div class="card">
      <h3>ATA 28 — Circuit carburant</h3>
      <div class="def">
        <span class="def-title">Crossfeed</span>
        Permet d'alimenter n'importe quel moteur depuis n'importe quel réservoir — utile en cas de panne d'une pompe ou de déséquilibre de carburant entre réservoirs.
      </div>
      <div class="calc">
        <span class="calc-label">Calcul de masse de carburant</span>
        <div class="calc-formula">Masse = Volume × Densité</div>
        <div class="calc-steps">
          <div class="calc-step"><span class="step-num">EX</span> 23 860 L de carburant, densité = 0,8</div>
          <div class="calc-step"><span class="step-num">→</span> 23 860 × 0,8</div>
        </div>
        <div class="calc-result">Résultat : <span>≈ 19 tonnes</span></div>
      </div>
      <div class="def">
        <span class="def-title">Jauge à capacitance</span>
        Mesure la capacité électrique du carburant dans le réservoir — la capacité varie selon le niveau de carburant, ce qui permet d'en déduire la quantité.
      </div>
    </div>
  </div>

  <!-- ════════════ VISSERIE ════════════ -->
  <div class="section acc-visserie" id="visserie">
    <div class="section-head">
      <div class="section-icon icon-visserie">🔩</div>
      <h2>Visserie</h2>
      <span class="session-tag">05.06</span>
    </div>

    <div class="card">
      <h3>Identifier une vis — 7 critères</h3>
      <ul>
        <li>Matière</li>
        <li>Diamètre</li>
        <li>Son pas</li>
        <li>Longueur totale</li>
        <li>Longueur de sa partie filetée / lisse</li>
        <li>Forme de la tête</li>
        <li>Référence du système (ISO-EU / Sellers-US / Whitworth-UK)</li>
      </ul>
    </div>

    <div class="card">
      <h3>3 familles de systèmes de vis</h3>
      <table class="mini-table">
        <tr><th>Système</th><th>Origine</th></tr>
        <tr><td><strong>ISO</strong></td><td>EU (Europe)</td></tr>
        <tr><td><strong>Sellers</strong></td><td>US — le plus utilisé en aéronautique</td></tr>
        <tr><td><strong>Whitworth</strong></td><td>UK (Royaume-Uni)</td></tr>
      </table>
    </div>

    <div class="card">
      <h3>Désignations Sellers — 2 formats</h3>
      <table class="mini-table">
        <tr><th>Désignation</th><th>Lecture</th></tr>
        <tr><td class="mono">NAS 5048-7-14</td><td>7 = diamètre en 16ᵉ de pouce (7/16) · 14 = partie lisse en 16ᵉ (14/16 = 7/8)</td></tr>
        <tr><td class="mono">3/8 - 24</td><td>3/8 = diamètre en pouces · 24 = nombre de filets par pouce</td></tr>
      </table>
      <div class="warn">
        <span class="warn-title">⚠ À retenir</span>
        Le diamètre d'une vis se prend sur sa <strong>partie filetée</strong>.
      </div>
    </div>
  </div>

  <!-- ════════════ TUYAUTERIES ════════════ -->
  <div class="section acc-tuyau" id="tuyau">
    <div class="section-head">
      <div class="section-icon icon-tuyau">🧵</div>
      <h2>Tuyauteries & raccords</h2>
      <span class="session-tag">05.06 – 08.06</span>
    </div>

    <div class="card">
      <h3>Les 3 pressions à connaître</h3>
      <table class="mini-table">
        <tr><th>Sigle</th><th>Définition</th></tr>
        <tr><td class="mono">Pn</td><td>Pression Nominale — pression max qu'une tuyauterie supporte (pression de référence)</td></tr>
        <tr><td class="mono">Pe</td><td>Pression d'Épreuve — pression min. que doit supporter la tuyauterie sans fuite ni détérioration</td></tr>
        <tr><td class="mono">Pr</td><td>Pression de Rupture — pression min. que doit supporter la tuyauterie avant de casser</td></tr>
      </table>
      <div class="calc">
        <span class="calc-label">Formules de sécurité</span>
        <div class="calc-formula">Pe = 2 × Pn &nbsp;&nbsp;|&nbsp;&nbsp; Pr = 4 × Pn</div>
        <div class="calc-steps">
          <div class="calc-step"><span class="step-num">EX</span> Si Pn = 100 bar</div>
          <div class="calc-step"><span class="step-num">→</span> Pe = 200 bar (doit résister sans fuite)</div>
          <div class="calc-step"><span class="step-num">→</span> Pr = 400 bar (doit résister avant de casser)</div>
        </div>
        <div class="calc-result">Marge de sécurité totale : <span>×4 entre usage normal et rupture</span></div>
      </div>
    </div>

    <div class="card">
      <h3>Diamètre nominal d'une tuyauterie souple</h3>
      <div class="def">
        <span class="def-title">Méthode <span class="def-badge">complété</span></span>
        Pour définir le diamètre nominal d'une tuyauterie souple, on cherche dans le circuit la <strong>première tuyauterie rigide</strong> connectée à celle-ci. Le diamètre nominal de la tuyauterie souple sera identique à celui de cette tuyauterie rigide de référence.
      </div>
    </div>

    <div class="card">
      <h3>Matières des tuyauteries</h3>
      <table class="mini-table">
        <tr><th>Matière</th><th>Usage</th></tr>
        <tr><td><strong>Alliages aluminium</strong></td><td>Circuits basse ou moyenne pression</td></tr>
        <tr><td><strong>Alliages inox</strong></td><td>Circuits soumis à corrosion / hautes contraintes (résistance chimique et mécanique élevée)</td></tr>
        <tr><td><strong>Alliage titane</strong></td><td>Zones nécessitant un excellent rapport résistance/poids, hautes pressions et températures (ex : zones moteur)</td></tr>
      </table>
    </div>

    <div class="card">
      <h3>Tuyaux souples — durée de vie</h3>
      <ul>
        <li><strong>Élastomère</strong> — après 7 ans : test de pression annuel obligatoire. Après 10 ans : rebutées (mise au rebut)</li>
        <li><strong>Téflon (PTFE)</strong> — pas de limite de stockage ni de durée de vie limitée</li>
      </ul>
    </div>

    <div class="card">
      <h3>Code couleur des tuyauteries</h3>
      <table class="mini-table">
        <tr><th>Circuit</th><th>Couleur(s)</th></tr>
        <tr><td>Carburant</td><td><span class="tag tag-red">Rouge</span></td></tr>
        <tr><td>Hydraulique</td><td><span class="tag tag-blue">Bleu</span> <span class="tag tag-yellow">Jaune</span></td></tr>
        <tr><td>Oxygène</td><td><span class="tag tag-green">Vert</span></td></tr>
        <tr><td>Pneumatique</td><td><span class="tag tag-orange">Orange</span> <span class="tag tag-blue">Bleu</span></td></tr>
      </table>
    </div>

    <div class="card">
      <h3>Règles de montage — Avant toute installation</h3>
      <ul>
        <li>Vérifier l'état et la propreté de la <strong>portée du raccord</strong></li>
        <li>Vérifier l'état et la propreté de la <strong>tuyauterie</strong></li>
        <li>Les écrous/corps de raccords doivent pouvoir <strong>reculer librement</strong> pour permettre la mise en place</li>
        <li>Les écrous doivent pouvoir se serrer <strong>à la main</strong>, sans effort sur le corps du raccord</li>
        <li><strong>Alignement parfait</strong> et sans contraintes</li>
        <li>Tuyauteries fixées dans leur support <strong>sans jeu ni contrainte</strong></li>
        <li>Respecter impérativement l'espacement indiqué dans la doc <strong>ATA 20</strong></li>
      </ul>
    </div>

    <div class="card">
      <h3>Règles de routage</h3>
      <div class="def">
        <span class="def-title">Espacement avec d'autres tuyauteries</span>
        Un écart de <strong>3 à 6 mm</strong> doit être respecté entre une tuyauterie et une autre lors du routage, pour éviter les frottements, vibrations croisées et faciliter l'inspection visuelle.
      </div>
      <div class="def">
        <span class="def-title">Raccords <span class="def-badge">complété</span></span>
        Un raccord est l'élément mécanique qui permet de relier deux tronçons de tuyauterie (ou une tuyauterie à un équipement) de façon étanche, tout en autorisant le démontage pour la maintenance. On distingue notamment les raccords filetés (vissés), les raccords à sertir et les raccords rapides (quick-disconnect), choisis selon la pression, le fluide et la fréquence de démontage attendue.
      </div>
    </div>
  </div>

</div>

    {id:'techno',   icon:'✈️', label:'Techno système',            bg:'var(--c-techno-bg)',   fg:'var(--c-techno)'},
    {id:'visserie', icon:'🔩', label:'Visserie',                  bg:'var(--c-visserie-bg)', fg:'var(--c-visserie)'},
    {id:'tuyau',    icon:'🧵', label:'Tuyauteries & raccords',    bg:'var(--c-tuyau-bg)',    fg:'var(--c-tuyau)'}
  ];

  var fab = document.getElementById('fab-btn');
  var indicator = document.getElementById('section-indicator');
  var siIcon = document.getElementById('si-icon');
  var siLabel = document.getElementById('si-label');

  var lastScrollY = window.scrollY;
  var hideTimeout = null;

  // Hide on scroll down, show on scroll up or when idle
  window.addEventListener('scroll', function(){
    var currentY = window.scrollY;
    var goingDown = currentY > lastScrollY + 4;
    var goingUp = currentY < lastScrollY - 4;

    if(goingDown){
      fab.classList.add('hidden');
      indicator.classList.add('hidden');
    } else if(goingUp){
      fab.classList.remove('hidden');
      indicator.classList.remove('hidden');
    }
    lastScrollY = currentY;

    // Show again after scroll stops
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(function(){
      fab.classList.remove('hidden');
      indicator.classList.remove('hidden');
    }, 700);

    updateActiveSection();
  }, {passive:true});

  function updateActiveSection(){
    var viewportMid = window.scrollY + window.innerHeight * 0.3;
    var current = sections[0];
    for(var i=0;i<sections.length;i++){
      var el = document.getElementById(sections[i].id);
      if(el && el.offsetTop <= viewportMid){
        current = sections[i];
      }
    }
    siIcon.textContent = current.icon;
    siIcon.style.background = current.bg;
    siIcon.style.color = current.fg;
    siLabel.textContent = current.label;
  }

  updateActiveSection();
})();
<\/script>

  .fc-tap{font-size:12px;color:var(--muted);}

  .flash-buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

    padding:14px;border-radius:9px;border:none;font-size:14px;font-weight:700;

  .flash-yes{background:var(--green-bg);color:var(--green);border:1px solid rgba(77,208,167,.3);}
  .flash-buttons.hidden, .flashcard.done{display:none;}
</style>
</head>
